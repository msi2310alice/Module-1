<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm giá trị nhỏ nhất của mảng</title>
</head>
<body>
    <p id="minvalue"></p>
    <script>
        let arr1 = [3, 5, 1, 8, -3, 7, 8];
        let arr2 = [7, 12, 6, 9, 20, 56, 89];
        let arr3 = [];
        let arr4 = [0, 0, 0, 0, 0, 0];
        function min(array) {
            let min = array[0];
            for (let i = 0; i < array.length; i++) {
                if (array[i]<min) {
                    min = array[i];
                }
            }
            document.getElementById("minvalue").innerHTML= 
            `Giá trị nhỏ nhất trong mảng {${array}} là: ${min}`;
        }
        min(arr1);
        // min(arr2);
        // min(arr3);
        // min(arr4);
    </script>
</body>
</html>
