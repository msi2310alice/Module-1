    <script>
        function Fibonacci() {
            let F1 = 0;
            let F2 = 1;
            let F;
            let solg = 8;
            let count = 3;
            text = "0; 1; ";
            let total = 1;
            while (count < solg) {
                F = F1 + F2;
                text += F + "; ";
                total += F;
                F1 = F2;
                F2 = F;
                count++;

            }
            console.log(text);
            console.log(total);
        }
        Fibonacci();
    </script>
