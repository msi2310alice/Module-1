<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 8</title>
</head>
<body>
    <p id="hienthi"><button type="button" onclick="doan()">Chơi</button></p>
    
    <script>
        function doan() {
            let a = +prompt("nhập a:");
            let b = +prompt("nhập b: ");
            let c = a + Math.floor((b-a)*Math.random());
            let i = 1;
            while (i<=3) {
                let input = +prompt("nhập số bạn đoán trong khoảng (a;b)");
                if (input < c) {
                    alert("Số bạn đoán nhỏ hơn số ngẫu nhiên");
                } else if (input > c) {
                    alert("Số bạn đoán lớn hơn số ngẫu nhiên");
                } else {
                    alert("Xin chúc mừng bạn đoán đúng");
                    break;
                }
                i++;
            }
            if (i >3 ) { 
                alert("bạn đã hết số lần nhập");
            }
            document.getElementById("hienthi").innerHTML = "bạn đã hết số lần nhập";
            
            
        }
        
    </script>
</body>
</html>
