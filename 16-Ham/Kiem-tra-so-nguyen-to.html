<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="lietKe"></p>
    <script>
        function isPrime(number) {
            let soNguyenTo = true;
            if (number==2) {
                // alert(`${number} là số nguyên tố `);
            } else if (number>2) {
                for (let i=2; i<number ; i++) {
                    if (number%i == 0) {
                        soNguyenTo=false;
                        break;
                    }
                }
            } else {
                alert("Bạn hãy nhập số nguyên dương lớn hơn 1!")
            }
            // console.log(soNguyenTo);
            return soNguyenTo;
        }
        // let a = +prompt("Nhập số nguyên cần kiểm tra: ");
        let b = +prompt("Nhập b để tìm tất cả số nguyên tố nhỏ hơn b!");
        let text ="";
        function hienThi(number) {
            for (let i=2; i<number; i++) {
                let c = isPrime(i);
                if (c) {
                    text += `${i}, `;
                }
            }
            document.getElementById("lietKe").innerHTML = 
            `Các số nguyên tố nhỏ hơn ${number} là: <br> ${text}`;
        }
        hienThi(b);

    </script>
</body>
</html>
