        // cách 2
        function timMin(array) {
            if (array.length==0) {
                return -1;
            } else {
                let min = array[0];
                let indexOfMin = 0;
                for (let i=0; i < array.length; i++) {
                    if (array[i]<min) {
                        min = array[i];
                        indexOfMin = i;
                    }
                }
                giaTriNhoNhat = [min,indexOfMin];
                return giaTriNhoNhat;
            }
        }
        function show(arr) {
            if (timMin(arr)==-1) {
                document.getElementById("minvalue").innerHTML =
                `Đây là mảng rỗng!`;
            } else {
                let a = timMin(arr);
                document.getElementById("minvalue").innerHTML =
                `Giá trị nhỏ nhất của mảng{${arr}} là ${a[0]} ở vị trí ${a[1]}`;
            }
        }
        show(arr4);
    </script>
