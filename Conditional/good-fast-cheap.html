<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good-Fast-Cheap</title>
</head>
<body>
    <input onclick="check(this.id)" type="checkbox" id="1">
    <label for="g">Good</label>
    <br>
    <input onclick="check(this.id)" type="checkbox" id="2">
    <label for="f">Fast</label>
    <br>
    <input onclick="check(this.id)" type="checkbox" id="3">
    <label for="c">Cheap</label>
    <script>
        /*
        m là id của thẻ cũng là số thứ tự thẻ
        x = m+1
        y = x+1
        click thẻ có id = m thì sẽ kiểm tra thẻ (m-1) và (m+1) 
        nếu 2 thẻ đó đang checked thì uncked thẻ (m+1) còn 
        lại thì chỉ checked thẻ được click
        */
        function check(m) {
            let x = parseInt(m);
            
            x = (x<3)? x+1 : 1;
            console.log(x);
            let y;
            y = (x<3)? x+1 :1;
            console.log(y);
            let a = document.getElementById(m);
            let b = document.getElementById(y);
            console.log(a.id);
            console.log(b.id);
            if (a.checked == true && b.checked == true) {
                document.getElementById(x).checked = false;
            }
            
        }
    </script>
</body>
</html>
