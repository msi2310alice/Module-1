<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính chỉ số cân nặng cơ thể</title>
</head>
<body>
    <form>
        <h1>Tính chỉ số cân nặng</h1>
        <label for="w">Nhập cân nặng: (kg) </label>
        <input type="text" id="w">
        <br>
        <label for="h">Nhập chiều cao: (m) </label>
        <input type="text" id="h">
        <br>
        <input type="button" value="Kiểm tra" onclick="ktrabmi()">
        <p id="kq"></p>
    </form>
    <script>
        
        function ktrabmi() {
            let w = parseInt(document.getElementById("w").value);
            let h = parseInt(document.getElementById("h").value);
            let bmi = w/(h**2);
            console.log(bmi);
            if (bmi < 18.5) {
            document.getElementById("kq").innerHTML="Underweight";
            } else if (bmi < 25) {
                document.getElementById("kq").innerHTML="Normal";
            } else if (bmi < 30) {
                document.getElementById("kq").innerHTML="Overweight";
            } else {
                document.getElementById("kq").innerHTML="Obese";
            }
        }
        
    </script>
</body>
</html>
