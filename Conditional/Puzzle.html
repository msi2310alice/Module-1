        function doianh(element) {
            switch(element.src) {
                case "http://127.0.0.1:5500/Conditional/hoa1.jpg": 
                    element.src = "http://127.0.0.1:5500/Conditional/hoa2.jpg";
                    break;
                case "http://127.0.0.1:5500/Conditional/hoa2.jpg":
                    element.src = "http://127.0.0.1:5500/Conditional/hoa3.jpg";
                    break;
                default:
                    element.src = "http://127.0.0.1:5500/Conditional/hoa1.jpg";

            console.log(element.id);
