        function doianh(anh) {
            let x = document.getElementById(anh);
            let y = parseInt(x.alt);
            y = (y<3)? y+1:1;
            x.src = "http://127.0.0.1:5500/Conditional/hoa" +y+".jpg";
            x.alt=y;
            kiemtra();
        }
        function kiemtra() {
            let a = document.getElementById("anh1").src;
            let b = document.getElementById("anh2").src;
            let c = document.getElementById("anh3").src;
